# projects.yaml
# Flagship and open-source projects. Mix of work-adjacent and personal.

projects:
  - id: command-palette-bitwarden
    title: Command Palette Extension for Bitwarden
    kind: open-source
    role: Author & maintainer
    status: active
    start: 2025-01
    summary: >-
      Open-source Bitwarden integration for the Windows Command Palette
      (the PowerToys-based command surface). Biometric-gated, signed MSI
      installer, Microsoft Store release, ongoing issue triage.
    highlights:
      - .NET 10 / WinUI 3 with WiX 5 MSI installer and Authenticode signing.
      - Microsoft Store release pipeline with release-please reusable workflows.
      - Biometric auth flow, vault state machine, TOTP enter-key behaviour.
      - WACK certification on x64 and ARM64.
      - CycloneDX SBOM published with every release and ingested into Dependency-Track.
    tech:
      - .NET 10
      - WinUI 3
      - WiX 5
      - GitHub Actions
      - CycloneDX
      - Microsoft Store
    links:
      - kind: repo
        url: https://github.com/hoobio/command-palette-bitwarden
      - kind: store
        url: https://apps.microsoft.com/

  - id: dependency-track-contribution
    title: OWASP Dependency-Track upstream contribution
    kind: open-source
    role: Contributor
    status: shipped
    summary: >-
      Upstream feature work on the OWASP Dependency-Track project (issue
      #4570). Container-based JDK build so the contribution could be
      validated end-to-end before the upstream PR.
    tech:
      - Java
      - Docker
    links:
      - kind: repo
        url: https://github.com/DependencyTrack/dependency-track
      - kind: issue
        url: https://github.com/DependencyTrack/dependency-track/issues/4570

  - id: earmark
    title: Earmark
    kind: personal
    role: Author
    status: active
    summary: >-
      Per-application audio output routing for Windows. Rules engine with
      conditions and actions (device-present, application-name regex), event-driven
      device and application enumeration, Fluent 2 design, signed MSI installer.
    tech:
      - .NET 10
      - WinUI 3
      - WiX 5
      - Fluent 2
      - PowerShell interop

  - id: hoobi-pr-reviewer
    title: PR Reviewer
    kind: personal
    role: Author
    status: active
    summary: >-
      Multi-agent system that orchestrates pull-request reviews across
      Azure DevOps and GitHub in parallel via MCP. Dispatches subagents
      per repository class (governance, infrastructure, GitOps, APIM) and
      consolidates feedback inline.
    tech:
      - Model Context Protocol
      - Claude Agent SDK
      - TypeScript
      - GitHub MCP
      - Azure DevOps MCP

  - id: personal-assistant
    title: Personal Assistant
    kind: personal
    role: Author
    status: active
    summary: >-
      Local LLM-driven personal assistant. Wake-word voice activation with
      on-device STT and TTS, tool-use bridge into Home Assistant for device
      and scene control, Jellyfin/Jellyseerr integration for media requests
      and playback control. Rich structured logging across the agent loop.
    tech:
      - Local LLM (llama.cpp / Ollama)
      - Whisper STT
      - Piper / Coqui TTS
      - Wake-word detection
      - Home Assistant
      - Jellyfin / Jellyseerr
      - Python
      - Structured logging

  - id: hoobi-automation
    title: Hoobi Automation
    kind: personal
    role: Author
    status: active
    summary: >-
      Home Assistant integration as a Windows service. Publishes
      last-input idle metrics over MQTT, drives audio-device restart
      automation and motion activated monitors / sleep.
    tech:
      - TypeScript
      - Node.js
      - MQTT
      - Home Assistant
      - Windows Services

  - id: internal-mcp-service
    title: Internal MCP services (architectural design)
    kind: work
    role: Architect
    status: in-design
    summary: >-
      Architectural design for an internal Model Context Protocol service.
      Regional API routing, OAuth-gated agent access, multi-domain ingress,
      relationship with the identity provider. Closed-source internal tool.
    tech:
      - APIM
      - MCP
      - OAuth
      - OIDC
      - Helm
      - Bicep

  - id: pim-automation
    title: Privileged Identity Management automation (internal tool)
    kind: work
    role: Contributor / designer
    status: shipped
    summary: >-
      A closed-source automation solution that drives PIM role assignments
      via IaC. Audited, repeatable, PR-gated. Rolled out across multiple
      product platforms.
    tech:
      - Terraform
      - Azure RBAC
      - PIM
      - Azure DevOps pipelines

  - id: cloudflare-edge
    title: Cloudflare WAF + Global Load Balancing
    kind: work
    role: Author
    status: shipped
    summary: >-
      Cloudflare WAF and global load balancing supplementing the incumbent
      edge stack. IaC for top-level domains, configuration, user onboarding
      with differentiated access levels per domain. Global APIs with
      claim-based regional routing for GDPR-compliant data residency.
    tech:
      - Cloudflare
      - Terraform
      - Global Load Balancing
      - WAF
      - GDPR
      - Claim-based routing
