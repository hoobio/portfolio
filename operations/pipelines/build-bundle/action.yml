name: Build site bundle + SBOM
description: Builds the web + api packages, generates the CycloneDX SBOM, exposes a build summary.

outputs:
  sbom-path:
    description: Path to the generated CycloneDX SBOM
    value: packages/api/public/sbom.cdx.json

runs:
  using: composite
  steps:
    - name: bun run build
      shell: bash
      run: bun run build

    - name: Stage SPA into api/public/web (for start:api to serve)
      shell: bash
      run: |
        set -euo pipefail
        rm -rf packages/api/public/web
        mkdir -p packages/api/public/web
        cp -R packages/web/dist/. packages/api/public/web/

    # build-cyclonedx-sbom auto-detects bun.lock and routes to syft when
    # found (cyclonedx-npm doesn't read bun lockfiles).
    - uses: hoobio/pipeline-tools/pipeline/github/step/build-cyclonedx-sbom@v2.2.0
      with:
        app-language: node
        app-manifest-path: .
        output-path: packages/api/public/sbom.cdx.json

    - name: Build summary
      shell: bash
      run: |
        {
          echo "## Build artifacts"
          echo
          du -sh packages/web/dist 2>/dev/null | awk '{print "- web bundle: " $0}'
          du -sh packages/api/dist 2>/dev/null | awk '{print "- api bundle: " $0}'
          if [ -f packages/api/public/sbom.cdx.json ]; then
            count=$(jq '.components | length' packages/api/public/sbom.cdx.json 2>/dev/null || echo unknown)
            echo "- SBOM components: $count"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
