name: PDT - Playwright + Bruno
description: |
  Production Deployment Tests. Runs Playwright UI tests and Bruno API tests
  against a base URL. If `base-url` is set, runs the `remote` projects against
  it. Otherwise spins up the dev server and runs the `local` projects.

inputs:
  base-url:
    description: Remote URL to test (omit for local dev-server run)
    required: false
    default: ''
  install-playwright-browsers:
    description: Run `playwright install --with-deps`
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install Playwright browsers
      if: ${{ inputs.install-playwright-browsers == 'true' }}
      shell: bash
      run: bunx playwright install --with-deps chromium

    - name: Playwright UI tests
      shell: bash
      env:
        PLAYWRIGHT_BASE_URL: ${{ inputs.base-url }}
      run: |
        if [ -n "${{ inputs.base-url }}" ]; then
          bunx playwright test --project=remote
        else
          bun run test:e2e
        fi

    - name: Bruno API tests
      shell: bash
      env:
        BRUNO_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.base-url }}" ]; then
          bunx bru run tests/api --env remote 2>&1 | tee bruno-output.txt
        else
          # Start the API ourselves so we see Bruno's stdout directly (start-server-and-test
          # buffers the inner command). Kill the server on exit.
          bun packages/api/src/server.ts > /tmp/api.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT
          # Wait up to 30s for /api/health to respond.
          for i in {1..60}; do
            if curl -fs http://localhost:8090/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          bunx bru run tests/api --env local 2>&1 | tee bruno-output.txt
        fi

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
        path: playwright-report/
        if-no-files-found: ignore
