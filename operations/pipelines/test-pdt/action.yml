name: PDT - Playwright + Bruno
description: |
  Production Deployment Tests. Runs Playwright UI tests and Bruno API tests
  against a base URL. If `base-url` is set, runs the `remote` projects against
  it. Otherwise spins up the dev server and runs the `local` projects.

  `mode` controls which suite(s) run: `ui` (Playwright only), `api`
  (Bruno only), or `all` (both, default).

inputs:
  base-url:
    description: Remote URL to test (omit for local dev-server run)
    required: false
    default: ''
  install-playwright-browsers:
    description: Run `playwright install --with-deps`
    required: false
    default: 'true'
  mode:
    description: Which suite to run (ui | api | all)
    required: false
    default: 'all'

runs:
  using: composite
  steps:
    - name: Install Playwright browsers
      if: ${{ (inputs.mode == 'ui' || inputs.mode == 'all') && inputs.install-playwright-browsers == 'true' }}
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Playwright UI tests
      if: ${{ inputs.mode == 'ui' || inputs.mode == 'all' }}
      shell: bash
      env:
        PLAYWRIGHT_BASE_URL: ${{ inputs.base-url }}
      run: |
        if [ -n "${{ inputs.base-url }}" ]; then
          pnpm exec playwright test --project=remote
        else
          pnpm run test:e2e
        fi

    - name: Bruno API tests
      if: ${{ inputs.mode == 'api' || inputs.mode == 'all' }}
      shell: bash
      env:
        BRUNO_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.base-url }}" ]; then
          (cd tests/api && pnpm exec bru run . --env remote) 2>&1 | tee bruno-output.txt
        else
          # Start the API ourselves so we see Bruno's stdout directly
          # (start-server-and-test buffers the inner command). Kill the
          # server on exit.
          node packages/api/dist/server.js > /tmp/api.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT
          # Wait up to 30s for /api/health to respond.
          for i in {1..60}; do
            if curl -fs http://localhost:8090/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          (cd tests/api && pnpm exec bru run . --env local) 2>&1 | tee bruno-output.txt
        fi

    - name: Upload Playwright report
      if: ${{ always() && (inputs.mode == 'ui' || inputs.mode == 'all') }}
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.mode }}
        path: playwright-report/
        if-no-files-found: ignore
