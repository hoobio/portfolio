version: 2
updates:
  # Workflow + composite-action pins (.github/workflows/*.yml, operations/pipelines/*/action.yml)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      # Group minor/patch only; majors stay individual so each can be
      # vetted (breaking-change risk on major version bumps).
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # API container base image
  - package-ecosystem: docker
    directory: /packages/api
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Australia/Melbourne
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  # pnpm workspace. Dependabot reads pnpm-lock.yaml directly for the npm
  # ecosystem and proposes updates against the manifest files.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
