name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Run oxlint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Run tsc --noEmit
        run: bun run typecheck

  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Run vitest with coverage
        run: bun run test:coverage

      - name: Coverage summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Coverage summary"
            echo
            echo "| package | statements | branches | functions | lines |"
            echo "|---|---:|---:|---:|---:|"
            for f in packages/*/coverage/coverage-summary.json; do
              [ -f "$f" ] || continue
              pkg=$(echo "$f" | cut -d/ -f2)
              s=$(jq -r '.total.statements.pct' "$f")
              b=$(jq -r '.total.branches.pct' "$f")
              fn=$(jq -r '.total.functions.pct' "$f")
              l=$(jq -r '.total.lines.pct' "$f")
              printf '| %s | %s%% | %s%% | %s%% | %s%% |\n' "$pkg" "$s" "$b" "$fn" "$l"
            done
          } | tee /tmp/coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(cat /tmp/coverage.md)$'\n\n<!-- coverage-bot -->'
          existing=$(gh api "repos/${{ github.repository }}/issues/$PR/comments" --paginate --jq '.[] | select(.body | contains("<!-- coverage-bot -->")) | .id' 2>/dev/null | head -1 || true)
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body="$BODY" > /dev/null
            echo "Updated coverage comment $existing"
          else
            gh pr comment "$PR" --body "$BODY"
            echo "Created coverage comment"
          fi

      - if: always()
        name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: packages/*/coverage/
          if-no-files-found: warn

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Build web + api + SBOM
        uses: ./operations/pipelines/build-bundle
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.run_id }}
          path: |
            packages/api/dist/
            packages/web/dist/
            packages/api/public/sbom.cdx.json
          if-no-files-found: error

  ui-tests:
    name: UI Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Build web + api + SBOM
        uses: ./operations/pipelines/build-bundle
      - name: Run Playwright (local dev server)
        uses: ./operations/pipelines/test-pdt
        with:
          base-url: ''
          mode: ui

  api-tests:
    name: API Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps
      - name: Build web + api + SBOM
        uses: ./operations/pipelines/build-bundle
      - name: Run Bruno (local dev server)
        uses: ./operations/pipelines/test-pdt
        with:
          base-url: ''
          mode: api

  sbom-scan:
    name: SBOM + DT scan
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: azure
    permissions:
      contents: read
      pull-requests: write
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      DT_DOMAIN: portfolio
      DT_SYSTEM: hoobi-portfolio
      DT_COMPONENT: site
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./operations/pipelines/install-deps

      # build-cyclonedx-sbom auto-detects bun.lock and routes to syft.
      - name: Build CycloneDX SBOM
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/build-cyclonedx-sbom@v2.2.0
        with:
          app-language: node
          app-manifest-path: .
          output-path: packages/api/public/sbom.cdx.json

      - name: Upload SBOM to Dependency-Track (channel=pr)
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v2.2.0
        with:
          bom-path: packages/api/public/sbom.cdx.json
          upload-artifact: 'false'
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          domain: ${{ env.DT_DOMAIN }}
          system: ${{ env.DT_SYSTEM }}
          component: ${{ env.DT_COMPONENT }}
          channel: pr
          default-branch: main
          project-version: pr-${{ github.event.pull_request.number }}
          project-tags: repo=${{ github.repository }},pr=${{ github.event.pull_request.number }},commit=${{ github.sha }}
          mark-latest: false
          prune-stale-children: true
          keep: '10'
          ci-keep: '3'
          wait-for-processing: 'true'

      - name: DT findings + PR gate
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/dt-findings-pr-gate@v2.2.0
        with:
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ env.DT_COMPONENT }}
          project-version: pr-${{ github.event.pull_request.number }}
          fail-on-severity: critical
          pr-number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
          github-token: ${{ github.token }}
          html-output-path: dt-findings.html
          artifact-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bom-path: packages/api/public/sbom.cdx.json

      - name: Upload HTML findings report
        if: always() && env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: actions/upload-artifact@v7
        with:
          name: dt-findings
          path: dt-findings.html
          if-no-files-found: warn
