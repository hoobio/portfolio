packages:
  - packages/*

# Build scripts must be allow-listed explicitly in pnpm v10+. esbuild needs
# its install-time postinstall to drop the native binary into node_modules;
# protobufjs ships with @bufbuild deps used by playwright tooling.
allowBuilds:
  esbuild: true
  protobufjs: true

# Force-resolve transitive axios to the latest stable. axios 1.13.x has
# three published critical CVEs (CVE-2026-42043, CVE-2026-42044,
# CVE-2026-42264); 1.16.x is patched. @usebruno/cli pulls in the
# vulnerable line transitively so we pin via override.
overrides:
  axios: 1.16.1
